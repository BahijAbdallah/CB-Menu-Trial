<svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo recreated as SVG based on the provided image -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#CD853F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D2691E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Arch/dome shape -->
  <path d="M50 10 Q100 -10 150 10 Q140 30 130 35 Q120 40 100 40 Q80 40 70 35 Q60 30 50 10 Z" 
        fill="url(#logoGradient)" stroke="#2F4F2F" stroke-width="2"/>
  
  <!-- Decorative elements inside arch -->
  <path d="M70 15 Q85 5 100 15 Q115 5 130 15 Q125 25 120 28 Q110 32 100 32 Q90 32 80 28 Q75 25 70 15 Z" 
        fill="#2F4F2F" opacity="0.7"/>
  
  <!-- "Chez" text -->
  <text x="20" y="65" font-family="serif" font-size="24" font-style="italic" fill="#2F4F2F">Chez</text>
  
  <!-- "BEYROUTH" text -->
  <text x="20" y="90" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2F4F2F" letter-spacing="2px">BEYROUTH</text>
  
  <!-- "BIENVENUE CHEZ VOUS" text -->
  <text x="20" y="105" font-family="sans-serif" font-size="8" fill="#2F4F2F" letter-spacing="1px">BIENVENUE CHEZ VOUS</text>
</svg>